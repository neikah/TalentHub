<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TalentHub Enterprise</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:#f4f7fc;
    font-family:Segoe UI,sans-serif;
}

.sidebar{
    min-height:100vh;
    background:#1e293b;
}

.sidebar h4{
    font-weight:bold;
}

.sidebar a{
    color:#d1d5db;
    display:block;
    padding:12px 18px;
    text-decoration:none;
    border-radius:8px;
    margin:5px;
    transition:.3s;
}

.sidebar a:hover{
    background:#2563eb;
    color:white;
}

.content{
    padding:30px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.table{
    border-radius:12px;
    overflow:hidden;
}

.btn-primary{
    border-radius:10px;
}

.navbar{
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

@media (max-width: 768px) {

    .sidebar{
        min-height:auto;
        padding-bottom:20px;
    }

    .content{
        padding:20px;
    }

}

</style>

</head>

<body>

{% include 'includes/navbar.html' %}

<div class="container-fluid">

<div class="row">

<div class="col-12 col-md-2 sidebar">

<h3>

<i class="bi bi-buildings"></i>

TalentHub

</h3>

{% include 'includes/sidebar.html' %}

</div>

<div class="col-12 col-md-10 content mt-3 mt-md-0">

{% block content %}

{% endblock %}

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center mt-5 mb-3 text-muted">

© 2026 TalentHub Enterprise Talent Acquisition Platform

</footer>

</body>
</html>
