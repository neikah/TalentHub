{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-4">

    <h2>Job Listings</h2>

    <a href="/recruitment/add/" class="btn btn-primary">
        + Add Job
    </a>

</div>

<table class="table table-hover align-middle">

    <thead class="table-dark">

        <tr>
            <th>Title</th>
            <th>Department</th>
            <th>Location</th>
            <th>Job Type</th>
            <th>Salary</th>
        </tr>

    </thead>

    <tbody>

    {% for job in jobs %}

        <tr>

            <td>{{ job.title }}</td>
            <td>{{ job.department }}</td>
            <td>{{ job.location }}</td>
            <td>{{ job.job_type }}</td>
            <td>{{ job.salary }}</td>

        </tr>

    {% empty %}

        <tr>

            <td colspan="5" class="text-center">

                No jobs available.

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
